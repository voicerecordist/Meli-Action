name: تلگرام دانلودر (هوشمند – حذف قبل از checkout)

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: '🔗 لینک‌های تلگرام (حداکثر ۲۰ عدد، جدا با کاما، فاصله یا خط جدید)'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 حداکثر حجم هر قطعه (MB) – 0 = بدون تقسیم'
        required: false
        type: number
        default: 90
      subfolder:
        description: '📁 زیرپوشهٔ دلخواه در downloads (اختیاری)'
        required: false
        type: string
        default: ''
      custom_filename:
        description: '✏️ نام فایل دلخواه (فقط برای تک‌فایل)'
        required: false
        type: string
        default: ''
      clean_previous:
        description: '🗑️ پاک‌سازی همهٔ فایل‌های downloads قبل از دانلود (پیشنهاد: تیک بخورد)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ──────────────────────────────────────
      # قدم اول: حذف فایل‌های قدیمی روی سرور گیتهاب (بدون checkout)
      # ──────────────────────────────────────
      - name: 🗑️ حذف محتوای downloads روی سرور (API)
        if: github.event.inputs.clean_previous == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          API="https://api.github.com/repos/${REPO}/contents/downloads?ref=${BRANCH}"
          echo "📡 دریافت لیست فایل‌های موجود در downloads..."
          FILES=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
                       -H "Accept: application/vnd.github+json" \
                       "$API")

          # اگر خطا بود یا پوشه وجود نداشت، ادامه بده
          if echo "$FILES" | grep -q "Not Found"; then
            echo "📂 پوشهٔ downloads وجود ندارد – چیزی برای حذف نیست."
            exit 0
          fi

          # اگر فایلی نیست
          COUNT=$(echo "$FILES" | jq '. | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "📂 پوشهٔ downloads خالی است."
            exit 0
          fi

          echo "🔍 $COUNT فایل پیدا شد – در حال حذف یکی‌یکی..."
          for row in $(echo "$FILES" | jq -r '.[] | @base64'); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }
            NAME=$(_jq '.name')
            SHA=$(_jq '.sha')
            PATH_URL="downloads/${NAME}"
            echo "   🗑️ حذف $NAME ..."
            curl -s -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${PATH_URL}" \
              -d "{\"message\":\"پاک‌سازی پیش از دانلود\",\"sha\":\"${SHA}\",\"branch\":\"${BRANCH}\"}" \
              > /dev/null
          done
          echo "✅ همهٔ فایل‌های قبلی از سرور حذف شدند."

      # ──────────────────────────────────────
      # قدم دوم: دریافت شاخه (حالا سبک و سریع)
      # ──────────────────────────────────────
      - name: 📂 دریافت مخزن (فقط آخرین نسخه)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ──────────────────────────────────────
      # بقیه مراحل مثل قبل
      # ──────────────────────────────────────
      - name: 🔧 نصب ابزارهای ضروری
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip python3 python3-pip

      - name: 🐍 نصب کتابخانه‌های پایتون
        run: pip3 install requests

      - name: 📝 ساخت اسکریپت دانلودر
        run: |
          cat > telegram_downloader.py << 'EOF'
          #!/usr/bin/env python3
          import os, sys, time, json, uuid
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import requests
          import re
          import subprocess

          def parse_links(raw_text):
              text = raw_text.replace(',', '\n').replace(' ', '\n')
              lines = text.splitlines()
              links = []
              for line in lines:
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith('http'):
                      links.append(line)
                  else:
                      if 't.me/' in line:
                          links.append('https://' + line.lstrip('/'))
              seen = set()
              unique_links = []
              for l in links:
                  if l not in seen:
                      seen.add(l)
                      unique_links.append(l)
              if len(unique_links) > 20:
                  print(f"⚠️ بیش از ۲۰ لینک تشخیص داده شد. فقط ۲۰ لینک اول پردازش می‌شود.")
                  unique_links = unique_links[:20]
              print(f"✅ {len(unique_links)} لینک معتبر شناسایی شد.")
              return unique_links

          def download_with_resume(url, dest, headers, max_retries=10, chunk_size=64*1024):
              dest = Path(dest)
              dest.parent.mkdir(parents=True, exist_ok=True)
              temp = dest.with_name(f".{uuid.uuid4().hex}.partial")
              downloaded = temp.stat().st_size if temp.exists() else 0
              sess = requests.Session()
              sess.headers.update(headers)

              for attempt in range(max_retries):
                  try:
                      range_header = {"Range": f"bytes={downloaded}-"} if downloaded > 0 else {}
                      resp = sess.get(url, stream=True, timeout=30, headers=range_header)
                      resp.raise_for_status()
                      total = int(resp.headers.get('content-length', 0))
                      if downloaded > 0:
                          total += downloaded
                      mode = 'ab' if downloaded > 0 else 'wb'
                      with open(temp, mode) as f:
                          for chunk in resp.iter_content(chunk_size=chunk_size):
                              if chunk:
                                  f.write(chunk)
                                  downloaded += len(chunk)
                                  if total > 0:
                                      pct = downloaded / total * 100
                                      bar = '█' * int(40 * downloaded // total) + '░' * (40 - int(40 * downloaded // total))
                                      print(f"\rپیشرفت: |{bar}| {pct:.1f}% ({downloaded}/{total} بایت)", end='', flush=True)
                      print()
                      temp.replace(dest)
                      return True, dest.stat().st_size
                  except (requests.exceptions.ChunkedEncodingError,
                          requests.exceptions.ConnectionError,
                          requests.exceptions.Timeout) as e:
                      print(f"\n⚠️ قطع ارتباط: {e}. تلاش {attempt+1}/{max_retries}")
                      time.sleep(2 ** attempt)
                  except Exception as e:
                      print(f"\n❌ خطای مرگبار: {e}")
                      if temp.exists():
                          temp.unlink()
                      return False, 0
              print("\n❌ تعداد تلاش‌ها به پایان رسید.")
              if temp.exists():
                  temp.unlink()
              return False, 0

          def fetch_direct_link(telegram_link, headers):
              api = "https://telegramdownloader.net/proxy.php"
              data = {"telegram_link": telegram_link}
              try:
                  resp = requests.post(api, headers=headers, data=data, timeout=15)
                  resp.raise_for_status()
                  result = resp.json()
                  raw_url = result.get('data', {}).get('data', {}).get('link')
                  file_name = result.get('data', {}).get('data', {}).get('file_name')
                  if not raw_url or not file_name:
                      return None, None, "لینک مستقیم یافت نشد"
                  return raw_url, file_name, None
              except Exception as e:
                  return None, None, str(e)

          def sanitize_name(name):
              if not name.isascii():
                  rand = os.urandom(8).hex()
                  ext = Path(name).suffix
                  if not ext:
                      ext = ".bin"
                  return f"{rand}{ext}"
              clean = re.sub(r'[^a-zA-Z0-9._-]', '_', name)
              clean = re.sub(r'__+', '_', clean)
              return clean

          def process_one_link(link, base_dir, session_headers):
              print(f"\n🔗 دریافت اطلاعات {link}")
              url, fname, err = fetch_direct_link(link, session_headers)
              if err:
                  print(f"❌ خطا: {err}")
                  return None, 0, err
              print(f"📁 نام اصلی: {fname}")
              dest = base_dir / fname
              counter = 1
              orig_stem = dest.stem
              orig_suffix = dest.suffix
              while dest.exists():
                  dest = base_dir / f"{orig_stem}_{counter}{orig_suffix}"
                  counter += 1
              print(f"🚀 شروع دانلود...")
              success, size = download_with_resume(url, dest, session_headers)
              if not success:
                  return None, 0, "دانلود ناموفق"
              print(f"✅ دانلود کامل: {dest.name} ({size/1e6:.2f} MB)")
              return dest, size, None

          def main():
              tel_links_env = os.environ.get("TEL_LINKS", "").strip()
              if not tel_links_env:
                  print("❌ هیچ لینکی وارد نشده.")
                  sys.exit(1)
              links = parse_links(tel_links_env)
              if not links:
                  print("❌ هیچ لینک معتبری یافت نشد.")
                  sys.exit(1)

              split_thresh_mb = int(os.environ.get("SPLIT_THRESH_MB", "0"))
              subfolder = os.environ.get("SUBFOLDER", "").strip()
              custom_filename = os.environ.get("CUSTOM_FILENAME", "").strip()

              base = Path("downloads")
              if subfolder:
                  base = base / subfolder
              base.mkdir(parents=True, exist_ok=True)

              headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

              results = []
              with ThreadPoolExecutor(max_workers=20) as executor:
                  futures = {executor.submit(process_one_link, link, base, headers): link for link in links}
                  for future in as_completed(futures):
                      link = futures[future]
                      try:
                          dest, size, err = future.result()
                          if err:
                              print(f"🔴 لینک ناموفق: {link} ({err})")
                          else:
                              results.append((dest, size))
                      except Exception as e:
                          print(f"🔴 خطا در پردازش {link}: {e}")

              if not results:
                  print("❌ هیچ فایلی با موفقیت دانلود نشد.")
                  sys.exit(1)

              if custom_filename and len(results) == 1:
                  dest, size = results[0]
                  ext = dest.suffix
                  if not Path(custom_filename).suffix and ext:
                      new_name = custom_filename + ext
                  else:
                      new_name = custom_filename
                  new_dest = dest.with_name(new_name)
                  dest.rename(new_dest)
                  print(f"✏️ نام فایل به {new_name} تغییر یافت.")
                  results[0] = (new_dest, size)
              elif custom_filename and len(results) > 1:
                  print("⚠️ نام سفارشی تنها برای یک فایل اعمال می‌شود. درخواست نادیده گرفته شد.")

              renamed = []
              for dest, size in results:
                  safe_name = sanitize_name(dest.name)
                  if safe_name != dest.name:
                      new_path = dest.with_name(safe_name)
                      dest.rename(new_path)
                      print(f"🌐 تغییر نام: {dest.name} -> {safe_name}")
                      renamed.append((new_path, size))
                  else:
                      renamed.append((dest, size))

              final_files = []
              for fpath, size in renamed:
                  if split_thresh_mb > 0 and size > split_thresh_mb * 1024 * 1024:
                      print(f"✂️ در حال تقسیم فایل {fpath.name} (حجم: {size/1e6:.1f}MB)")
                      zip_base = fpath.with_suffix(".zip")
                      cmd = f"zip -s {split_thresh_mb}m \"{zip_base.name}\" -j \"{fpath.name}\""
                      print(f"   اجرای: {cmd}")
                      subprocess.run(cmd, shell=True, check=True, cwd=fpath.parent)
                      fpath.unlink()
                      parts = sorted(fpath.parent.glob(f"{zip_base.stem}.z*")) + [zip_base]
                      for p in parts:
                          final_files.append(p)
                      print(f"   {len(parts)} بخش ساخته شد.")
                  else:
                      final_files.append(fpath)

              info = [{"file": str(f.relative_to(Path("downloads"))), "size": f.stat().st_size} for f in final_files]
              with open(base / ".download_results.json", "w") as f:
                  json.dump(info, f, indent=2)

              print("\n🎉 همه عملیات با موفقیت پایان یافت.")
              print("فایل‌های نهایی:")
              for f in final_files:
                  print(f"   {f}")

          if __name__ == "__main__":
              main()
          EOF
          chmod +x telegram_downloader.py

      - name: 🚀 اجرای دانلودر
        run: |
          export TEL_LINKS="${{ github.event.inputs.telegram_links }}"
          export SPLIT_THRESH_MB="${{ github.event.inputs.split_threshold_mb }}"
          export SUBFOLDER="${{ github.event.inputs.subfolder }}"
          export CUSTOM_FILENAME="${{ github.event.inputs.custom_filename }}"
          python3 telegram_downloader.py

      - name: 📤 ارسال فایل‌های جدید به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "⚠️ هیچ فایلی برای بارگذاری وجود ندارد!"
            exit 1
          fi

          find downloads -type f ! -name "*.partial" ! -name ".download_results.json" -exec git add {} \;

          if git diff --cached --quiet; then
            echo "✅ فایل جدیدی برای commit وجود ندارد."
            exit 0
          fi

          git commit -m "Add downloaded files [skip ci]"

          for attempt in 1 2 3; do
            if git push origin ${{ github.ref_name }} 2>&1; then
              echo "   ✅ بارگذاری موفق"
              break
            else
              if [ $attempt -lt 3 ]; then
                echo "   ⚠️ push ناموفق، تلاش دوباره $attempt/3..."
                sleep 5
              else
                echo "   ❌ push پس از ۳ تلاش ناموفق ماند"
                exit 1
              fi
            fi
          done
